<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth — Game 1</title>
  <link rel="stylesheet" href="../../styles/jeu1/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="overlay"
    style="display:flex; justify-content:center; align-items:center; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10; flex-direction:column;">

    <div id="menu">
      <h1>Labyrinth</h1>
      <p>Rules : catch the hat and avoid the guards!</p>
      <button type="button" id="startBtn">Start the game</button>
    </div>

    <div id="endScreen" style="display:none; text-align:center; color:#fff;">
      <h1 id="endMessage"></h1>
      <button type="button" id="restartBtn">Play again</button>
      <button type="button" id="continueBtn" style="display:none;">Continue the adventure</button>
    </div>
  </div>

  <canvas id="Canva-jeu"></canvas>

  <div id="joystick">
    <div id="stick"></div>
  </div>

  <script src="../../js/jeu1/script.js"></script>
</body>

</html>
